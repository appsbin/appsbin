<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ModVault - Home</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #141313; color: #e5e2e1; font-family: 'Manrope', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; -webkit-font-smoothing: antialiased; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }

  /* NAV */
  nav { position: fixed; top: 0; width: 100%; z-index: 50; height: 56px; display: flex; align-items: center; justify-content: center; background: rgba(10,10,10,0.85); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); }
  .nav-title { font-size: 17px; font-weight: 700; letter-spacing: -0.02em; color: #fff; display: flex; align-items: center; gap: 6px; }

  /* MAIN */
  main { width: 100%; max-width: 600px; padding: 76px 16px 60px; display: flex; flex-direction: column; align-items: center; gap: 16px; flex-grow: 1; }

  /* HERO */
  .hero { text-align: center; padding: 16px 0 8px; }
  .hero h1 { font-size: clamp(26px, 8vw, 42px); font-weight: 700; letter-spacing: -0.02em; color: #fff; margin-bottom: 6px; }
  .hero p { font-size: 13px; color: #8e9192; }

  /* APP LIST */
  #app-list { width: 100%; display: flex; flex-direction: column; gap: 10px; }

  /* APP CARD */
  .app-card { display: flex; align-items: center; gap: 12px; background: #201f1f; border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 12px 14px; text-decoration: none; transition: background 0.25s; width: 100%; overflow: hidden; }
  .app-card:hover { background: #2a2a2a; }
  .app-card:active { background: #2f2f2f; }

  /* Icon */
  .card-icon { width: 50px; height: 50px; min-width: 50px; border-radius: 12px; overflow: hidden; background: #2a2a2a; border: 1px solid rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: center; }
  .card-icon img { width: 100%; height: 100%; object-fit: cover; display: block; }

  /* Info */
  .card-info { flex: 1; min-width: 0; overflow: hidden; }
  .card-name { font-size: 15px; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
  .card-desc { font-size: 12px; color: #8e9192; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* Download button */
  .card-btn { flex-shrink: 0; background: #fff; color: #1a1a1a; border-radius: 999px; display: flex; align-items: center; gap: 5px; padding: 0 14px; height: 38px; font-size: 13px; font-weight: 600; white-space: nowrap; transition: background 0.2s; }
  .card-btn:hover { background: #e3e2e2; }
  .card-btn .material-symbols-outlined { font-size: 17px; }
  @media (max-width: 380px) { .card-btn-label { display: none; } .card-btn { padding: 0 11px; } }

  /* SKELETON */
  @keyframes pulse-soft { 0%,100%{opacity:1} 50%{opacity:.4} }
  .skeleton { animation: pulse-soft 1.8s ease-in-out infinite; background: #2a2a2a; border-radius: 8px; }

  /* Smooth fade-in for app list */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .app-card { animation: fadeIn 0.3s ease forwards; }

  /* FOOTER */
  footer { width: 100%; padding: 18px 16px; background: #0a0a0a; border-top: 1px solid rgba(255,255,255,0.05); text-align: center; margin-top: auto; }
  footer p { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: #3a3a3a; }
</style>
</head>
<body>

<script>
  // 🔧 তোমার Google Sheet ID
  const SHEET_ID = "1J1Usvj-YwhaZt74Mhf3U4QoCbDok2QcsiLf_GzRFENY";

  async function fetchApps() {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
    try {
      const res = await fetch(url);
      const text = await res.text();
      const json = JSON.parse(text.substring(47).slice(0, -2));
      return json.table.rows.map((row, i) => ({
        id: i + 1,
        name:        row.c[0]?.v || "",
        description: row.c[1]?.v || "",
        icon:        row.c[2]?.v || "",
        version:     row.c[3]?.v || "",
        platform:    row.c[4]?.v || "",
        downloadUrl: row.c[5]?.v || "",
        features:    row.c[6]?.v || "",
      }));
    } catch (err) {
      console.error(err);
      return [];
    }
  }

  function renderApps(apps) {
    const list = document.getElementById("app-list");
    let html = "";
    apps.forEach((app) => {
      const icon = app.icon
        ? `<img src="${app.icon}" alt="${app.name}" onerror="this.style.display='none'"/>`
        : `<span class="material-symbols-outlined" style="color:#636565;font-size:22px">android</span>`;
      html += `
        <a href="dl.html?id=${app.id}" class="app-card">
          <div class="card-icon">${icon}</div>
          <div class="card-info">
            <div class="card-name">${app.name}</div>
            <div class="card-desc">${app.description}</div>
          </div>
          <div class="card-btn">
            <span class="card-btn-label">Download</span>
            <span class="material-symbols-outlined">download</span>
          </div>
        </a>`;
    });
    list.innerHTML = html;
  }

  function showSkeletons() {
    const list = document.getElementById("app-list");
    list.innerHTML = Array(4).fill(`
      <div class="app-card" style="pointer-events:none">
        <div class="skeleton card-icon"></div>
        <div class="card-info" style="display:flex;flex-direction:column;gap:8px;">
          <div class="skeleton" style="height:13px;width:55%;border-radius:4px;"></div>
          <div class="skeleton" style="height:11px;width:75%;border-radius:4px;"></div>
        </div>
        <div class="skeleton card-btn" style="background:#2a2a2a;color:transparent;"></div>
      </div>`).join("");
  }

  function showError() {
    document.getElementById("app-list").innerHTML = `
      <div style="text-align:center;padding:48px 16px;color:#8e9192;">
        <span class="material-symbols-outlined" style="font-size:44px;color:#444748;display:block;margin-bottom:12px;">wifi_off</span>
        <p style="font-size:14px;">Something went wrong. Please try again later.</p>
        <button onclick="location.reload()" style="margin-top:16px;background:#fff;color:#141313;border:none;border-radius:999px;padding:8px 20px;font-size:13px;font-weight:600;cursor:pointer;">Retry</button>
      </div>`;
  }

  window.addEventListener("DOMContentLoaded", async () => {
    showSkeletons();
    const apps = await fetchApps();
    if (!apps.length) { showError(); return; }
    renderApps(apps);
  });
</script>

<!-- Nav -->
<nav><span class="nav-title"><span class="material-symbols-outlined" style="font-size:18px;font-variation-settings:'FILL' 1;">verified</span>ModVault</span></nav>

<!-- Main -->
<main>
  <div class="hero">
    <h1>Mod APKs</h1>
    <p>Premium apps & games — unlocked & free.</p>
  </div>

  <div id="app-list"></div>
</main>

<!-- Footer -->
<footer><p>© 2026 ModVault</p></footer>

</body></html>
