<!-- ========================================================
     🔧 GOOGLE SHEETS CONFIGURATION
     
     ১. Google Sheets এ যান
     ২. Share → "Anyone with the link" → Viewer করুন
     ৩. URL থেকে Sheet ID কপি করুন:
        https://docs.google.com/spreadsheets/d/[SHEET_ID]/edit
     ৪. নিচের SHEET_ID replace করুন
     ======================================================== -->
<script>
  const SHEET_ID = "1Z3-HRTo8VeZKafhlS3u9dq58IPoGLi0K6ecUBkyiW4w";

  // Google Sheets থেকে data fetch করার function
  async function fetchApps() {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
    try {
      const res = await fetch(url);
      const text = await res.text();
      // Google এর JSONP response থেকে JSON extract করা
      const json = JSON.parse(text.substring(47).slice(0, -2));
      const rows = json.table.rows;

      // Row গুলোকে app object এ convert করা
      // Sheet column order: name, description, icon_url, version, platform, download_url, features
      return rows.map((row, index) => ({
        id: index + 1,
        name:         row.c[0]?.v || "",
        description:  row.c[1]?.v || "",
        icon:         row.c[2]?.v || "",
        version:      row.c[3]?.v || "",
        platform:     row.c[4]?.v || "",
        downloadUrl:  row.c[5]?.v || "",
        features:     row.c[6]?.v || "",
      }));
    } catch (err) {
      console.error("Sheet fetch error:", err);
      return [];
    }
  }

  // App card HTML তৈরি করা
  function createAppCard(app, index) {
    const adAfter = [1, 3]; // ২য় ও ৪র্থ card এর পরে ad দেখাবে

    const card = `
      <a href="apppage.html?id=${app.id}" class="block bg-surface-container hover:bg-surface-container-high transition-colors duration-500 ease-out rounded-xl p-4 md:p-6 flex items-center gap-3 md:gap-6 border border-white/5 group relative overflow-hidden">
        <!-- App Icon -->
        <div class="w-12 h-12 md:w-16 md:h-16 bg-surface-container-high rounded-xl overflow-hidden shrink-0 flex items-center justify-center border border-white/10">
          ${app.icon
            ? `<img src="${app.icon}" alt="${app.name}" class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity duration-300" onerror="this.style.display='none'"/>` 
            : `<span class="material-symbols-outlined text-outline text-2xl">android</span>`
          }
        </div>
        <!-- App Info — min-w-0 prevents text overflow -->
        <div class="flex-grow flex flex-col justify-center min-w-0">
          <h3 class="font-headline-md text-base md:text-[24px] font-semibold text-primary mb-0.5 truncate">${app.name}</h3>
          <p class="text-sm md:text-body-md text-on-surface-variant truncate">${app.description}</p>
        </div>
        <!-- Download Button — mobile: icon only, desktop: icon + text -->
        <div class="shrink-0 bg-primary text-background font-label-md text-label-md rounded-full hover:bg-secondary-fixed transition-colors duration-300 flex items-center gap-1.5 px-3 py-2.5 md:px-6 md:py-3">
          <span class="hidden md:inline text-sm font-medium">Download</span>
          <span class="material-symbols-outlined text-[18px]">download</span>
        </div>
      </a>`;

    // প্রতি ২টা card পরে ad placeholder
    const adBlock = adAfter.includes(index) ? `
      <div class="w-full flex justify-center py-2">
        <div class="w-full max-w-[300px] h-[250px] bg-surface-container flex flex-col items-center justify-center rounded-xl border border-white/5">
          <!-- 🔧 Adsterra / AdSense script এখানে বসান -->
          <span class="material-symbols-outlined text-outline mb-2 text-3xl">ads_click</span>
          <span class="font-label-sm text-label-sm text-outline tracking-widest uppercase">Advertisement</span>
        </div>
      </div>` : "";

    return card + adBlock;
  }

  // Skeleton loader (data লোড হওয়ার আগে দেখাবে)
  function showSkeletons() {
    const list = document.getElementById("app-list");
    list.innerHTML = Array(4).fill(`
      <div class="bg-surface-container rounded-xl p-6 flex items-center gap-6 border border-white/5">
        <div class="skeleton w-16 h-16 rounded-xl shrink-0"></div>
        <div class="flex-grow flex flex-col gap-2">
          <div class="skeleton h-5 w-36 rounded"></div>
          <div class="skeleton h-4 w-52 rounded"></div>
        </div>
        <div class="skeleton w-28 h-11 rounded-full shrink-0"></div>
      </div>`).join("");
  }

  // Error message দেখানো
  function showError(msg) {
    document.getElementById("app-list").innerHTML = `
      <div class="text-center py-12 text-on-surface-variant">
        <span class="material-symbols-outlined text-5xl mb-3 block text-outline">error_outline</span>
        <p class="font-body-md">${msg}</p>
      </div>`;
  }

  // Page load হলে apps fetch করা
  window.addEventListener("DOMContentLoaded", async () => {
    showSkeletons();

    if (SHEET_ID === "YOUR_GOOGLE_SHEET_ID_HERE") {
      showError("⚠️ SHEET_ID এখনো set করা হয়নি। homepage.html এ SHEET_ID দিন।");
      return;
    }

    const apps = await fetchApps();

    if (!apps.length) {
      showError("Google Sheet এ কোনো data পাওয়া যায়নি। Sheet টি Public করা আছে কিনা চেক করুন।");
      return;
    }

    document.getElementById("app-list").innerHTML = apps.map(createAppCard).join("");
  });
</script>
